<dialog class="cart-container">
  <div class="upper-portion">
    <div class="cart-dialog">
      <p>Your cart (0 items)</p>
      <button type="button" id="close-cart">Close</button>
    </div>

    <ul class="cart-items-list">
      <li>
        <img src="" alt="item image" />
        <div>
          <p>item name</p>
          <p>Subtotal (0 items): <span>$0.00</span></p>
          <button type="button" id="remove-item">Remove</button>
        </div>
      </li>
    </ul>
    <p>Your order is eligible for free shipping.</p>
  </div>
  <div class="lower-portion">
    <div>
      <p>Sub total: <span>$0.00</span></p>
      <button type="button" id="checkout">Checkout</button>
    </div>
    <div>
      <p>We accept:</p>
      <ul>
        <li>
          <img
            src="./images/shop/payment/mastercard-full-svgrepo-com.svg"
            alt="mastercard"
          />
        </li>
        <li>
          <img
            src="./images/shop/payment/visa-4-logo-svgrepo-com.svg"
            alt="visa"
          />
        </li>
        <li>
          <img
            src="./images/shop/payment/paypal-svgrepo-com.svg"
            alt="paypal"
          />
        </li>
        <li>
          <img
            src="./images/shop/payment/amazon-pay-svgrepo-com.svg"
            alt="amazonpay"
          />
        </li>
      </ul>
    </div>
  </div>
</dialog>
