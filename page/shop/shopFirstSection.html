<section class="shop-first-section">
  <h2>OUR COLLECTIONS</h2>
  <div class="select-category">
    <fieldset>
      <legend>Select category</legend>
      <label>
        <input type="radio" name="category" value="all" id="all-item" />
        <span class="checkmark"></span>
        All
      </label>
      <label>
        <input type="radio" name="category" value="earrings" id="earring" />
        <span class="checkmark"></span>
        Earrings
      </label>
      <label>
        <input type="radio" name="category" value="necklaces" id="necklace" />
        <span class="checkmark"></span>
        Necklaces
      </label>
      <label>
        <input type="radio" name="category" value="bracelets" id="bracelet" />
        <span class="checkmark"></span>
        Bracelets
      </label>
      <label>
        <input type="radio" name="category" value="rings" id="ring" />
        <span class="checkmark"></span>
        Rings
      </label>
      <label>
        <input type="radio" name="category" value="bangles" id="bangle" />
        <span class="checkmark"></span>
        Bangles
      </label>
      <label>
        <input type="radio" name="category" value="tiaras" id="tiara" />
        <span class="checkmark"></span>
        Tiaras
      </label>
      <label>
        <input type="radio" name="category" value="anklets" id="anklet" />
        <span class="checkmark"></span>
        Anklets
      </label>
    </fieldset>
    <ul class="filter-category">
      <li><p>Filter</p></li>
      <li><button type="button">Most popular</button></li>
      <li><button type="button">Cheapest to expensive</button></li>
      <li><button type="button">Newest to oldest</button></li>
      <li><button type="button">New release</button></li>
    </ul>
  </div>
</section>
