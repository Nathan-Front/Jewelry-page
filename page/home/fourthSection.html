<section class="home-fourth-section">
  <div>
    <h3>Get in Touch</h3>
    <p>We love to hear from you!</p>
  </div>
  <form action="" id="form">
    <label for="name-input">Name</label>
    <input
      type="text"
      placeholder="Enter your name"
      name="userName"
      id="name-input"
    />
    <label for="mail-input">Email address</label>
    <input
      type="text"
      placeholder="Enter email"
      name="userEmail"
      id="mail-input"
    />
    <label for="contact-input">Contact number</label>
    <input
      type="text"
      placeholder="Enter contact"
      name="userContact"
      id="contact-input"
    />
    <textarea
      name="userMessage"
      id="message-input"
      placeholder="Message"
    ></textarea>
    <button type="submit">Submit</button>
  </form>
</section>
